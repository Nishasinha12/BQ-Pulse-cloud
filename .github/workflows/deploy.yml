name: Build, Push, and Deploy BQ Pulse

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name bqpulseacrnisha

      - name: Build Docker image
        run: docker build -t bqpulseacrnisha.azurecr.io/bqpulse:${{ github.sha }} -t bqpulseacrnisha.azurecr.io/bqpulse:latest .

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bqpulseacrnisha.azurecr.io/bqpulse:latest
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Push image to ACR
        run: docker push bqpulseacrnisha.azurecr.io/bqpulse:${{ github.sha }} && docker push bqpulseacrnisha.azurecr.io/bqpulse:latest

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name bqpulse-app \
            --resource-group bqpulse-rg \
            --image bqpulseacrnisha.azurecr.io/bqpulse:${{ github.sha }}